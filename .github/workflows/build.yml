name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          # إنشاء gradle wrapper إذا لم يكن موجوداً
          if [ ! -f "gradlew" ]; then
            echo "Creating gradle wrapper..."
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-RAT
          path: app/build/outputs/apk/debug/*.apk
